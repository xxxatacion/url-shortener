<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" href="../static/style/general.css">
    <link rel="stylesheet" href="../static/style/dashboard.css">

    <link rel="stylesheet" th:href="@{/style/general.css}">
    <link rel="stylesheet" th:href="@{/style/dashboard.css}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>
<header style="padding: 20px;">
    <form th:action="@{/}" method="get">
        <button id="startseite_button" type="submit">Startseite</button>
    </form>
    <div>
        <p style="font-size: 24px; margin: 0; font-weight: bold;">Dashboard</p>
    </div>
    <div style="width: 100px;"></div> </header>

<main>
    <div class="dashboard-content">

        <div id="listen-container">
            <div class="link-container"
                 th:each="item : ${Dashboard.statsShortUrls}"
                 th:onclick="selectedListObject([[${item}]])">

                <div class="row-top">
                    <div>Short-URL: <span style="color: #90abee;" th:text="${baseUrl} + ${item.shortLinkDTO.shortUrl}"></span></div>
                    <div>Klicks: <span th:text="${#lists.size(item.statsDTOS)}"></span></div>
                </div>

                <div class="row-bottom">
                    Original: <span th:text="${item.shortLinkDTO.originalUrl}"></span>
                </div>
            </div>
        </div>

        <div id="diagramm-bereich" style="display: none;">
            <h4 id="diagramm-titel" style="margin-top: 0; font-size: 20px;">Statistik</h4>

            <button id="zeitraum-btn" onclick="toggleZeitraum()">Zeige letzte 30 Tage</button>

            <div style="width: 100%; flex-grow: 1; display: flex; align-items: center; justify-content: center;">
                <canvas id="klickDiagramm"></canvas>
            </div>
        </div>

    </div>
</main>

<script>
    Chart.defaults.color = '#fff';

    let currentListObject = null;
    let currentPeriod = 7;
    let diagram = null;

    function selectedListObject(itemDaten) {
        currentListObject = itemDaten;
        currentPeriod = 7;

        document.getElementById('diagramm-bereich').style.display = 'flex'; // Wichtig: auf flex ändern, nicht block
        document.getElementById('diagramm-titel').innerText = "Klicks für: " + itemDaten.shortLinkDTO.shortUrl;
        document.getElementById('zeitraum-btn').innerText = "Zeige letzte 30 Tage";

        drawDiagram();
    }

    function toggleZeitraum() {
        if (currentPeriod === 7) {
            currentPeriod = 30;
            document.getElementById('zeitraum-btn').innerText = "Zeige letzte 7 Tage";
        } else {
            currentPeriod = 7;
            document.getElementById('zeitraum-btn').innerText = "Zeige letzte 30 Tage";
        }
        drawDiagram();
    }

    function drawDiagram() {
        if (!currentListObject) return;

        const stats = currentListObject.statsDTOS;

        const dataAfterDay = {};
        for (let i = currentPeriod - 1; i >= 0; i--) {
            let d = new Date();
            d.setDate(d.getDate() - i);
            let datumString = d.toISOString().split('T')[0];
            dataAfterDay[datumString] = 0;
        }

        const limitDate = new Date();
        limitDate.setDate(limitDate.getDate() - currentPeriod);

        stats.forEach(stat => {
            let clickDate = new Date(stat.timestamp);
            if (clickDate >= limitDate) {
                let dateString = clickDate.toISOString().split('T')[0];
                if (dataAfterDay[dateString] !== undefined) {
                    dataAfterDay[dateString]++;
                }
            }
        });

        const labels = Object.keys(dataAfterDay);
        const daten = Object.values(dataAfterDay);

        if (diagram) {
            diagram.destroy();
        }

        const ctx = document.getElementById('klickDiagramm').getContext('2d');
        diagram = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Klicks',
                    data: daten,
                    borderColor: 'rgba(144, 171, 238, 1)',
                    backgroundColor: 'rgba(144, 171, 238, 0.2)',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { stepSize: 1 },
                        grid: { color: 'rgba(255, 255, 255, 0.1)' }
                    },
                    x: {
                        grid: { color: 'rgba(255, 255, 255, 0.1)' }
                    }
                }
            }
        });
    }
</script>
</body>
</html>
