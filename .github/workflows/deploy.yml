name: Continuous Deployment

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Google Cloud Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            export PATH=$JAVA_HOME/bin:$PATH
            
            cd url-shortener
            git remote set-url origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git pull
            
            cd client && mvn clean package -DskipTests
            cd ..
            cd shortener-service && mvn clean package -DskipTests
            cd ..
            cd workspace-service && mvn clean package -DskipTests
            cd ..
            cd stats-service && mvn clean package -DskipTests
            cd ..
            
            echo "SHORTENER_PUBLIC_URL=${{ secrets.SHORTENER_PUBLIC_URL }}" > .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            
            docker-compose down
            
            
            
            docker-compose up -d --build